<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- Rounded square background -->
  <rect width="1024" height="1024" rx="220" ry="220" fill="#E8EDF5"/>

  <!-- DAG edges (drawn behind nodes) -->
  <!-- Source → Top task -->
  <line x1="210" y1="512" x2="512" y2="248" stroke="#2B4A7A" stroke-width="46" stroke-linecap="round"/>
  <!-- Source → Bottom task -->
  <line x1="210" y1="512" x2="512" y2="776" stroke="#2B4A7A" stroke-width="46" stroke-linecap="round"/>
  <!-- Top task → Output -->
  <line x1="512" y1="248" x2="814" y2="512" stroke="#2B4A7A" stroke-width="46" stroke-linecap="round"/>
  <!-- Bottom task → Output -->
  <line x1="512" y1="776" x2="814" y2="512" stroke="#2B4A7A" stroke-width="46" stroke-linecap="round"/>

  <!-- Source node (left) — blue trigger -->
  <circle cx="210" cy="512" r="108" fill="#3B72C0"/>

  <!-- Top task node — blue (running/ok) -->
  <circle cx="512" cy="248" r="96" fill="#3B72C0"/>

  <!-- Bottom task node — red (failed, the thing we watch for) -->
  <circle cx="512" cy="776" r="96" fill="#E53E3E"/>

  <!-- Output node (right) — green success -->
  <circle cx="814" cy="512" r="108" fill="#38A169"/>
</svg>
